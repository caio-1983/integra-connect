server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: React Router owns "/" and every client-side path (e.g. /auth,
    # /operations). Without this, nginx 404s on direct hits or refreshes of those
    # paths because no matching file exists on disk. ProtectedRoute in App.tsx is
    # what actually sends unauthenticated users from "/" to the login page.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }
}
